<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Delivered</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .wordmark span {
      color: #4ade80;
    }

    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .projects-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 1.25rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }

    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border: 1px solid #222;
      border-radius: 8px;
      text-decoration: none;
      color: #f0f0f0;
      background: #111;
      transition: border-color 0.15s, background 0.15s;
    }

    .project-link:hover {
      border-color: #4ade80;
      background: #141a14;
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .project-desc {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.2rem;
    }

    .arrow {
      color: #444;
      font-size: 1.1rem;
      transition: color 0.15s, transform 0.15s;
    }

    .project-link:hover .arrow {
      color: #4ade80;
      transform: translateX(3px);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="wordmark">Product<span>Delivered</span></div>
  <div class="tagline">Software &amp; Tools by Neil Stryjski</div>

  <div class="projects-label">Projects</div>

  <div class="projects">
    <a class="project-link" href="https://itin-wizard.vercel.app/itin-wizard/">
      <div>
        <div class="project-name">Trip Wizard</div>
        <div class="project-desc">AI-powered travel itinerary from your booking docs</div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>

    <!-- Add future projects here -->
    <!--
    <a class="project-link" href="/vechelon">
      <div>
        <div class="project-name">Vechelon</div>
        <div class="project-desc">Coming soon</div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>
    -->
  </div>

  <footer>productdelivered.ca</footer>

</body>
</html>
